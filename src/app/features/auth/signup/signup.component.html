<div class="auth-wrapper">

  <!-- LEFT -->
  <div class="auth-left">
    <img src="assets/app.png" alt="Quantify">
    <h3>Your measurement<br>companion.</h3>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">

    <div class="auth-tabs">
      <span (click)="goToLogin()">Login</span>
      <span class="active">Sign Up</span>
    </div>

    <h2>Create account</h2>
    <p class="auth-sub">Free forever. No credit card required.</p>

    <form (ngSubmit)="signup()">

      <div class="field-wrap">
        <label for="signup-email">Email address</label>
        <input id="signup-email" [(ngModel)]="form.email" name="email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="field-wrap">
        <label for="signup-password">Password</label>
        <input id="signup-password" [(ngModel)]="form.password" name="password" type="password" placeholder="Min. 8 characters" required>
      </div>

      <button class="auth-btn" type="submit">Create Account →</button>

    </form>

    <div class="auth-divider">or continue with</div>

    <div class="google-btn">
      <div id="google-btn-signup"></div>
    </div>

  </div>

</div>
